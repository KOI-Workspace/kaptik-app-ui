<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaptik — Weverse Live</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 바텀 시트 -->
  <div class="sheet" id="sheet">
    <!-- 최신 자막으로 이동 버튼 (시트 상단 중앙) -->
    <button class="scroll-to-top-btn" id="scrollToTopBtn" aria-label="최신 자막으로 이동">↑ 최신</button>
    <div class="sheet-content" id="sheetContent"></div>
  </div>

  <!-- FAB 그룹 -->
  <div class="fab-group">
    <button class="lang-fab" id="langFab" aria-label="영상 정보 및 언어 설정">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="8" y1="6" x2="8" y2="3"/>
        <line x1="8" y1="6" x2="8" y2="9"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
        <line x1="16" y1="18" x2="16" y2="15"/>
        <line x1="16" y1="18" x2="16" y2="21"/>
      </svg>
    </button>
    <a href="index.html" class="exit-fab" aria-label="나가기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </a>
  </div>

  <!-- 언어/정보 팝업 -->
  <div class="lang-panel" id="langPanel">
    <div class="lang-panel-title">아미랑 아리랑</div>
    <div class="lang-panel-meta">
      <div class="live-chip"><span class="live-dot"></span>LIVE</div>
      <span class="meta-text">BTS · 01.16</span>
    </div>
    <div class="lang-panel-divider"></div>
    <select id="langSelect" class="lang-select">
      <option value="en">🇺🇸 English</option>
      <option value="id">🇮🇩 Bahasa Indonesia</option>
      <option value="ja">🇯🇵 日本語</option>
      <option value="zh-CN">🇨🇳 中文(简体)</option>
      <option value="zh-TW">🇹🇼 中文(繁體)</option>
      <option value="es">🇪🇸 Español</option>
      <option value="pt">🇧🇷 Português</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="ko">🇰🇷 한국어</option>
      <option value="ar">🇸🇦 العربية</option>
      <option value="hi">🇮🇳 हिंदी</option>
      <option value="th">🇹🇭 ภาษาไทย</option>
      <option value="vi">🇻🇳 Tiếng Việt</option>
      <option value="ru">🇷🇺 Русский</option>
      <option value="tr">🇹🇷 Türkçe</option>
    </select>
  </div>

  <!-- 컨트롤 바 -->
  <div class="control-bar" id="controlBar">
    <button class="start-btn" id="startBtn">▶ Start</button>
    <button class="reset-btn" id="resetBtn">↺ Reset</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
