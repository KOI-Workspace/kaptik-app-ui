<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaptik</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand:        #8353EB;
      --brand-hover:  #7445DA;
      --brand-soft:   rgba(131,83,235,0.18);
      --brand-glow:   rgba(131,83,235,0.42);
      --page:         #050505;
      --surface:      #191919;
      --surface-el:   #202020;
      --text-1:       #FFFFFF;
      --text-2:       #B7B7B7;
      --text-3:       #7D7D7D;
      --border:       rgba(255,255,255,0.13);
      --border-sub:   rgba(255,255,255,0.08);
      --notif:        #FF625C;
      --r-card:       20px;
      --r-panel:      24px;
      --r-pill:       999px;
      --shadow-card:  0 10px 28px rgba(0,0,0,0.32);
      --shadow-nav:   0 10px 30px rgba(0,0,0,0.50);
      --font:         'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    body {
      background: var(--page);
      color: var(--text-1);
      font-family: var(--font);
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      overflow-x: hidden;
      padding-bottom: 112px;
    }

    /* ── 상단 헤더 ── */
    .top-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--page);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border-sub);
    }

    .logo {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text-1);
    }

    .logo span { color: var(--brand); }

    .header-actions { display: flex; gap: 6px; align-items: center; }

    .flag-btn {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-el);
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: background 180ms ease-out;
      overflow: hidden;
    }
    .flag-btn:active { background: var(--surface); }

    .icon-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: var(--text-1);
      cursor: pointer; border-radius: var(--r-pill);
      position: relative;
      transition: background 180ms ease-out;
    }
    .icon-btn:active { background: rgba(255,255,255,0.07); }

    .notif-badge {
      position: absolute; top: 6px; right: 6px;
      width: 8px; height: 8px;
      background: var(--notif); border-radius: 50%;
      border: 2px solid var(--page);
    }

    /* ── 탭 ── */
    .tabs {
      display: flex;
      gap: 0;
      padding: 0 20px;
      border-bottom: 1px solid var(--border-sub);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      font-size: 18px;
      font-weight: 850;
      color: #6A6A6A;
      padding: 14px 16px 12px;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      cursor: pointer;
      transition: color 180ms ease-out;
    }
    .tab.active {
      color: var(--text-1);
      border-bottom-color: var(--text-1);
    }
    .tab .dot {
      display: inline-block; width: 5px; height: 5px;
      background: var(--notif); border-radius: 50%;
      vertical-align: super; margin-left: 3px;
    }

    /* ── 섹션 ── */
    .page-content { padding: 24px 20px 0; }

    .section-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
    }

    /* ── Hero Live Card ── */
    .hero-live-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-panel);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      text-decoration: none;
      color: var(--text-1);
      cursor: pointer;
      display: block;
      transition: transform 120ms ease-out;
    }
    .hero-live-card:active { transform: scale(0.99); }

    /* 썸네일 영역 */
    .hero-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #000;
    }

    .hero-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 썸네일 위 그라디언트 */
    .hero-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
    }

    .thumb-badges {
      position: absolute;
      top: 12px; left: 12px;
      display: flex; gap: 7px;
      z-index: 1;
    }

    .live-pill {
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.62);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--r-pill);
      padding: 5px 11px;
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.5px;
      backdrop-filter: blur(6px);
    }
    .live-dot-red {
      width: 6px; height: 6px;
      background: var(--notif); border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .viewer-pill {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--r-pill);
      padding: 5px 11px;
      font-size: 11px; font-weight: 600;
      color: var(--text-2);
      backdrop-filter: blur(6px);
    }

    .kaptik-badge {
      position: absolute;
      top: 12px; right: 12px;
      z-index: 1;
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(131,83,235,0.22);
      border: 1px solid rgba(131,83,235,0.5);
      border-radius: var(--r-pill);
      padding: 5px 11px;
      font-size: 11px; font-weight: 700;
      color: #C4AAFF;
      backdrop-filter: blur(6px);
    }

    /* 카드 바디 */
    .hero-body {
      padding: 16px 18px 18px;
    }

    .hero-title {
      font-size: 18px; font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 10px;
      line-height: 1.25;
    }

    .hero-meta {
      display: flex; align-items: center;
      gap: 8px;
      color: var(--text-2); font-size: 13px; font-weight: 600;
      margin-bottom: 14px;
    }

    .hero-avatar {
      width: 24px; height: 24px; border-radius: 50%;
      background: #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 800; color: rgba(255,255,255,0.6);
      flex-shrink: 0;
    }

    .hero-metrics {
      display: flex; gap: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border-sub);
      color: var(--text-3); font-size: 13px; font-weight: 600;
    }

    .metric { display: flex; align-items: center; gap: 5px; }

    .watch-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      background: var(--brand);
      color: #fff;
      font-size: 15px; font-weight: 800;
      border: none; border-radius: 14px;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: background 180ms ease-out, transform 120ms ease-out;
    }
    .watch-btn:active { background: var(--brand-hover); transform: scale(0.98); }

    /* ── 아티스트 스트립 ── */
    .artists-rail {
      display: flex; gap: 14px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
      margin-bottom: 28px;
    }
    .artists-rail::-webkit-scrollbar { display: none; }

    .artist-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 7px; cursor: pointer; flex-shrink: 0;
    }

    .artist-ring {
      width: 58px; height: 58px;
      border-radius: 50%;
      padding: 2px;
      background: var(--border-sub);
    }
    .artist-ring.live-ring {
      background: linear-gradient(135deg, var(--notif), #FF8A65);
    }

    .artist-avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800;
      color: var(--text-2);
      border: 2px solid var(--page);
    }

    .artist-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-2); text-align: center;
      max-width: 58px;
    }

    /* ── 피드 카드 ── */
    .feed-card {
      background: var(--surface);
      border-radius: var(--r-card);
      border: 1px solid var(--border-sub);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .feed-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 16px 12px;
    }

    .feed-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface-el);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: var(--text-2);
      flex-shrink: 0;
    }

    .feed-name {
      font-size: 15px; font-weight: 700;
    }
    .feed-name .group {
      font-weight: 500; color: var(--text-3); font-size: 14px;
    }
    .feed-time { font-size: 12px; color: var(--text-3); margin-top: 2px; }

    .feed-body {
      padding: 0 16px 14px;
      font-size: 15px; font-weight: 500;
      line-height: 1.55; color: var(--text-1);
    }

    .feed-actions {
      display: flex; gap: 20px;
      padding: 12px 16px;
      border-top: 1px solid var(--border-sub);
    }

    .feed-action {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: var(--text-3);
    }

    /* ── 하단 네비게이션 (pill) ── */
    .bottom-nav {
      position: fixed;
      left: 50%; bottom: calc(12px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: calc(min(430px, 100vw) - 34px);
      height: 72px;
      background: linear-gradient(180deg, rgba(42,42,42,0.82) 0%, rgba(22,22,22,0.90) 100%);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      box-shadow: var(--shadow-nav);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 8px;
      z-index: 50;
    }

    .nav-item {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; border-radius: var(--r-pill);
      cursor: pointer; border: none; background: none;
      color: var(--text-2);
      font-size: 11px; font-weight: 700;
      transition: background 180ms ease-out, color 180ms ease-out;
    }
    .nav-item.active {
      background: rgba(255,255,255,0.16);
      color: var(--text-1);
    }
    .nav-item:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header class="top-header">
    <div class="logo">kap<span>tik</span></div>
    <div class="header-actions">
      <button class="flag-btn" aria-label="언어 선택">
        🇺🇸
      </button>
      <button class="icon-btn" aria-label="검색">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="icon-btn" aria-label="알림">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-badge"></span>
      </button>
    </div>
  </header>

  <!-- 탭 -->
  <nav class="tabs">
    <div class="tab active">All</div>
    <div class="tab">Live <span class="dot"></span></div>
    <div class="tab">Media</div>
  </nav>

  <div class="page-content">

    <!-- 내 아티스트 -->
    <div style="margin-bottom:20px;">
      <p class="section-title" style="font-size:14px;font-weight:700;color:var(--text-3);letter-spacing:0.02em;text-transform:uppercase;margin-bottom:14px;">My Artists</p>
      <div class="artists-rail">
        <div class="artist-item">
          <div class="artist-ring live-ring">
            <div class="artist-avatar-inner" style="background:#fff;overflow:hidden;">
              <img src="public/images/bts logo white.png" alt="BTS" style="width:65%;height:65%;object-fit:contain;" />
            </div>
          </div>
          <span class="artist-label">BTS</span>
        </div>
        <div class="artist-item">
          <div class="artist-ring">
            <div class="artist-avatar-inner" style="background:#fff;overflow:hidden;">
              <img src="public/images/txt logo white.jpg" alt="TXT" style="width:65%;height:65%;object-fit:contain;" />
            </div>
          </div>
          <span class="artist-label">TXT</span>
        </div>
        <!-- + 추가 버튼 -->
        <div class="artist-item">
          <div class="artist-ring" style="background:var(--border);">
            <div class="artist-avatar-inner" style="background:var(--surface-el);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
          </div>
          <span class="artist-label">Add</span>
        </div>
      </div>
    </div>

    <!-- Hero Live Card -->
    <div style="margin-bottom:32px;">
      <p class="section-title" style="display:flex;align-items:center;gap:8px;">
        <span style="width:8px;height:8px;background:var(--notif);border-radius:50%;display:inline-block;animation:blink 1.2s infinite;"></span>
        Live Now
      </p>
      <a href="player.html" class="hero-live-card">
        <!-- 썸네일 -->
        <div class="hero-thumb">
          <img src="public/images/아미랑 아리랑.jpeg" alt="아미랑 아리랑" />
          <div class="thumb-badges">
            <div class="live-pill"><span class="live-dot-red"></span>LIVE</div>
          </div>
        </div>

        <!-- 카드 바디 -->
        <div class="hero-body">
          <div class="hero-title">아미랑 아리랑</div>
          <div class="hero-meta">
            <div class="hero-avatar">BTS</div>
            <span>BTS</span>
            <span style="color:var(--text-3);">· 01.16  17:42</span>
          </div>

          <button class="watch-btn" onclick="event.preventDefault();location.href='player.html'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            Play Subtitle
          </button>
        </div>
      </a>
    </div>

    <!-- 피드 -->
    <p class="section-title" style="font-size:18px;margin-bottom:14px;">Recent</p>

    <div class="feed-card">
      <div class="feed-header">
        <div class="feed-avatar">RM</div>
        <div>
          <div class="feed-name">RM <span class="group">· BTS</span></div>
          <div class="feed-time">2 hours ago</div>
        </div>
      </div>
      <div class="feed-body">오늘도 고마워요 아미들 💜 내일 봐요</div>
    </div>

    <div class="feed-card">
      <div class="feed-header">
        <div class="feed-avatar">JM</div>
        <div>
          <div class="feed-name">Jimin <span class="group">· BTS</span></div>
          <div class="feed-time">5 hours ago</div>
        </div>
      </div>
      <div class="feed-body">연습 열심히 했어요~ 다들 잘 자요 🌙</div>
    </div>

  </div>

  <!-- 하단 네비게이션 -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <button class="nav-item active" aria-current="page">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Feed
    </button>
    <button class="nav-item" onclick="location.href='player.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
      Live
    </button>
    <button class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      Saved
    </button>
    <button class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Me
    </button>
  </nav>

</body>
</html>
